<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Nhập mật khẩu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #4c1d95 0%, #7e22ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            width: 100%;
            max-width: 440px;
            border-radius: 32px;
            padding: 55px 45px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
            border: 5px solid #e0bbff;
        }

        .lock-icon {
            font-size: 6.5rem;
            margin-bottom: 20px;
            animation: shake 2.5s infinite ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-12deg); }
            50% { transform: rotate(12deg); }
        }

        h1 {
            color: #6b4e91;
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8b6fbf;
            font-size: 1.15rem;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #6b4e91;
            font-weight: 600;
        }

        input[type="password"] {
            width: 100%;
            padding: 18px 22px;
            border: 3px solid #d8b4fe;
            border-radius: 20px;
            font-size: 1.1rem;
            background: #fdf4ff;
            transition: all 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 0 5px rgba(192, 132, 252, 0.25);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #c084fc, #a855f7);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(168, 85, 247, 0.4);
            transition: all 0.4s;
        }

        button:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(168, 85, 247, 0.5);
        }

        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 14px 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            font-weight: 500;
            border: 2px solid #fecaca;
        }

        .hint {
            margin-top: 35px;
            font-size: 0.95rem;
            color: #9f7aea;
            background: #f3e8ff;
            padding: 16px 20px;
            border-radius: 20px;
            border: 2px dashed #d8b4fe;
        }

        .decor {
            font-size: 2.5rem;
            opacity: 0.15;
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <!-- Decor -->
        <div class="decor" style="top: 30px; left: 40px;">🍄</div>
        <div class="decor" style="bottom: 40px; right: 50px; transform: rotate(25deg);">🍋</div>

        <div class="lock-icon">🔒</div>
        
        <h1>👑 Admin Panel</h1>
        <p class="subtitle">Nhập mật khẩu để vào khu vực quản trị 🍄</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="password">Mật khẩu Admin</label>
                <input type="password" 
                       name="password" 
                       id="password" 
                       placeholder="••••••••" 
                       required 
                       autofocus>
            </div>

            <button type="submit">
                🔓 Mở khóa Admin Panel
            </button>
        </form>

        
    </div>
</body>
</html>
