<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Web Truyện{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e0f2fe 100%);
            color: #5a3d7a;
            min-height: 100vh;
        }

        /* Header với nấm và chanh */
        header {
            background: linear-gradient(90deg, #d8b4fe, #c084fc);
            padding: 1.2rem 0;
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.3);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '🍄';
            position: absolute;
            font-size: 4rem;
            opacity: 0.15;
            top: -20px;
            left: 10%;
        }

        header::after {
            content: '🍋';
            position: absolute;
            font-size: 3.5rem;
            opacity: 0.15;
            top: -10px;
            right: 15%;
            transform: rotate(20deg);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            font-size: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Container chính */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(192, 132, 252, 0.15);
            border: 2px solid #e0bbff;
        }

        /* Story Grid */
        .story-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .story-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid #f3d9ff;
        }

        .story-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 35px rgba(192, 132, 252, 0.25);
            border-color: #d8b4fe;
        }

        .story-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .story-card:hover img {
            transform: scale(1.08);
        }

        .story-info {
            padding: 16px;
            text-align: center;
        }

        .story-card h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #6b4e91;
        }

        .locked { 
            color: #f472b6; 
            font-weight: 600; 
        }
        .unlocked { 
            color: #4ade80; 
            font-weight: 600; 
        }

        /* Chapter List */
        .chapter-list {
            list-style: none;
        }

        .chapter-list li {
            padding: 14px 18px;
            border-bottom: 1px dashed #e0bbff;
            transition: 0.3s;
        }

        .chapter-list li:hover {
            background: #f3e8ff;
            padding-left: 24px;
        }

        /* Messages */
        .message {
            padding: 14px 20px;
            margin-bottom: 20px;
            border-radius: 16px;
            font-weight: 500;
        }

        .error {
            background: #ffe4e6;
            color: #e11d48;
            border-left: 5px solid #fb7185;
        }

        .success {
            background: #ecfdf5;
            color: #10b981;
            border-left: 5px solid #34d399;
        }

        /* Buttons & Inputs */
        button, input[type="submit"] {
            padding: 12px 24px;
            background: linear-gradient(90deg, #c084fc, #a855f7);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(168, 85, 247, 0.3);
        }

        button:hover, input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }

        input[type="text"], 
        input[type="password"], 
        textarea, 
        select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 18px;
            border: 2px solid #e0bbff;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #c084fc;
            box-shadow: 0 0 0 4px rgba(192, 132, 252, 0.2);
        }

        /* Thêm chút nấm nhỏ làm decoration */
        .mushroom-decor {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <span>🍄</span> Tiểu Chanh Tử 
            </div>
            <nav>
                <a href="{% url 'home' %}">🏠 Trang chủ</a>
                <a href="{% url 'get_password_guide' %}">🔑 Hướng dẫn lấy mật khẩu</a> 
                <a href="{% url 'admin_dashboard' %}">👑 Admin Panel</a>
            </nav>
        </div>
    </header>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Decor nấm nhỏ ở góc -->
    <div class="mushroom-decor" style="bottom: 30px; left: 40px;">🍄</div>
    <div class="mushroom-decor" style="top: 180px; right: 80px; transform: rotate(30deg);">🍋</div>
</body>
</html>
